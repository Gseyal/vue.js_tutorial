<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <nav >
        <ul class=" nav nav-tabs">
            <li v-for='(page,index) in pages' class="nav-item" key="{{index}}">
                <a class="nav-link"
                :class="{active: activepage == index}"
                :href="page.url" 
                :title="page.description" 
                v-on:click.prevent="activepage=index">{{page.text}}</a>
            </li>
        </ul>
        
    </nav>
    <div id="header" class="container">
        <h1>{{pages[activepage].pagetitle}}</h1><!-- returned variables are shown here in the page under {{variable}} -->
        <p>{{pages[activepage].pagesub}}</p>
    </div>
    
    <script>
            Vue.createApp({ // Vue.createApp creates an instance (object for a single point of time) for the page.
                data(){ //data is a function which returns the key value pair.
                    return{
                        activepage:0,
                        pages:[{text:'Home',url:'home.html',description:"Go to Home Page",pagetitle:"Welcome Home",pagesub:"This is Home Page"},
                            {text:'Features',url:'features.html',description:"Explore our features",pagetitle:"Features",pagesub:"Explore our features"},
                            {text:'Pricing',url:'pricing.html',description:"View our pricing options",pagetitle:"Pricing",pagesub:"View our pricing options"}
                        ],
                    }
                }
            }).mount('body')// mount means to hung object on which and we specify by adding #id_name
        </script>
</body> 
</script>
</html>
