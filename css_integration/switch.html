<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://unpkg.com/vue@3"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary" :data-bs-theme="isdark?'dark':'light'">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">{{Website_Name}}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li v-for="(page,index) in pages" :key="index" class="nav-item">
            <a class="nav-link active" aria-current="page" :href="page.url"
              @click.prevent="activepage=index">{{page.text}}</a>
          </li>
        </ul>
      </div>
      <div class="form-check form-switch" @click.prevent="isdark=!isdark">
        <input class="form-check-input" type="checkbox" value="" id="checkNativeSwitch" switch>
        <label class="form-check-label" for="checkNativeSwitch" :class="{'text-light': isdark , 'text-dark': !isdark}">
          Dark Mode
        </label>
      </div>
    </div>
  </nav>
  <div id="header" class="container">
    <h1>{{pages[activepage].pagetitle}}</h1><!-- returned variables are shown here in the page under {{variable}} -->
    <p>{{pages[activepage].pagesub}}</p>
  </div>

  <script>
    Vue.createApp({ // Vue.createApp creates an instance (object for a single point of time) for the page.
      data() { //data is a function which returns the key value pair.
        return {
          isdark:false,
          Website_Name: "My Website",
          activepage: 0,
          pages: [{ text: 'Home', url: 'home.html', description: "Go to Home Page", pagetitle: "Welcome Home", pagesub: "This is Home Page" },
          { text: 'Features', url: 'features.html', description: "Explore our features", pagetitle: "Features", pagesub: "Explore our features" },
          { text: 'Pricing', url: 'pricing.html', description: "View our pricing options", pagetitle: "Pricing", pagesub: "View our pricing options" }
          ],
        }
      }
    }).mount('body')// mount means to hung object on which and we specify by adding #id_name
  </script>
</body>
</script>

</html>
