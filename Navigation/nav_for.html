<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <nav >
        <ul class=" nav nav-tabs">
            <li v-for='(link,index) in links' class="nav-item" key="{{index}}">
                <a class="nav-link" v-bind:href="link.url"  :title="link.description">{{link.text}}</a>
            </li>
        </ul>
        
    </nav>
    <div id="header" class="container">
        <h1>{{introtitle}}</h1><!-- returned variables are shown here in the page under {{variable}} -->
        <p>{{introsub}}</p>
    </div>
    
    <script>
            Vue.createApp({
                data(){
                    return{
                        links:[{text:'Home',url:'home.html',description:"Go to Home Page"},
                            {text:'Features',url:'features.html',description:"Explore our features"},
                            {text:'Pricing',url:'pricing.html',description:"View our pricing options"}
                        ]
                    }
                }
            }).mount('nav');
            Vue.createApp({ // Vue.createApp creates an instance (object for a single point of time) for the page.
                data(){ //data is a function which returns the key value pair.
                    return{
                        introtitle:"Introduction",
                        introsub:"This is Basic Html, Upgrade with Vue.js"
                    }
                }
            }).mount('#header')// mount means to hung object on which and we specify by adding #id_name
        </script>
</body> 
</script>
</html>
